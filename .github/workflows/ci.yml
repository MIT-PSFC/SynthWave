name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Cache OFT
        uses: actions/cache@v4
        with:
          path: submodules/OpenFUSIONToolkit
          key: oft-v1.0.0-beta6-ubuntu-22.04

      - name: Install
        run: ./install.sh

      - name: Ruff format check
        run: uv run ruff format --check synthwave/

      - name: Ruff lint
        run: uv run ruff check synthwave/

      - name: Isort
        run: uv run isort synthwave/

  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        test-file:
          - test_utils.py
          - test_equilibrium_field.py
          - test_filaments.py
          - test_thincurr.py
    name: test (${{ matrix.test-file }})
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Cache OFT
        uses: actions/cache@v4
        with:
          path: submodules/OpenFUSIONToolkit
          key: oft-v1.0.0-beta6-ubuntu-22.04

      - name: Install
        run: ./install.sh

      - name: Run tests
        run: uv run pytest synthwave/tests/${{ matrix.test-file }}

  notebooks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Cache OFT
        uses: actions/cache@v4
        with:
          path: submodules/OpenFUSIONToolkit
          key: oft-v1.0.0-beta6-ubuntu-22.04

      - name: Install
        run: ./install.sh

      - name: Run notebooks
        run: uv run pytest --nbmake examples/
